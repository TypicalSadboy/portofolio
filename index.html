<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero {
            display: flex;
            align-items: center;
            gap: 48px;
            background: #0e0e0e;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 56px 48px;
            max-width: 720px;
            width: 100%;
        }

        .hero-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #333;
            flex-shrink: 0;
            overflow: hidden;
        }

        .hero-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-role {
            font-size: 13px;
            font-weight: 400;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            color: #f0ede8;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .hero-divider {
            width: 32px;
            height: 2px;
            background: #c9a96e;
            border-radius: 2px;
            margin-bottom: 16px;
        }

        .hero-bio {
            font-size: 15px;
            font-weight: 300;
            color: #aaa;
            line-height: 1.75;
            margin-bottom: 24px;
            max-width: 420px;
        }

        .hero-links {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        .btn-primary {
            background: #c9a96e;
            color: #0e0e0e;
            border: none;
        }

        .btn-secondary {
            background: transparent;
            color: #888;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <section class="hero">
        <img class="hero-avatar" src="picture/picture.jpeg" alt="Foto Profil">
        <div>
            <p class="hero-role">Learner Web Developer</p>
            <h1 class="hero-name">Tubagus Ramaesha Taftazany</h1>
            <div class="hero-divider"></div>
            <p class="hero-bio">
                Halo! Aku Rama yang masih belajar dalam hal web development.
                Aku ingin mengetahui lebih banyak tentang web development dan ini adalah website pertama aku yang aku buat untuk belajar.
                
            </p>
            <div class="hero-links">
                <a href="mailto:ramaeshatz@gmail.com" class="btn btn-primary">Hubungi Aku</a>
                <a href="portofolio.html" class="btn btn-secondary">Lihat Portofolio</a>
            </div>
        </div>
    </section>
</body>
</html>
